<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.ico" />

    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <!-- Faster One font for brand name -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Faster+One&display=swap" rel="stylesheet" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#78350f" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Jeanzey – Luxury Fashion in Mumbai | Shop Online</title>
    <meta name="description" content="Jeanzey is Mumbai's premium luxury fashion destination. Shop trendy men's and women's shirts, jeans, t-shirts and combo outfits online. Free delivery across India." />
    <meta name="keywords" content="Jeanzey, luxury fashion Mumbai, men's fashion, women's fashion, online shopping India, shirts, jeans, t-shirts, combo outfits, premium clothing" />
    <meta name="robots" content="index, follow" />
    <meta name="revisit-after" content="3 days" />
    <meta name="author" content="Jeanzey" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://jeanzey.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jeanzey.com/" />
    <meta property="og:title" content="Jeanzey – Luxury Fashion in Mumbai | Shop Online" />
    <meta property="og:description" content="Mumbai's premium luxury fashion destination. Shop trendy men's and women's shirts, jeans, t-shirts and combo outfits online. Free delivery across India." />
    <meta property="og:image" content="https://jeanzey.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Jeanzey" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@jeanzey" />
    <meta name="twitter:title" content="Jeanzey – Luxury Fashion Store Mumbai | Shop Online" />
    <meta name="twitter:description" content="Mumbai's premium luxury fashion destination. Shop trendy men's and women's shirts, jeans, t-shirts and combo outfits online." />
    <meta name="twitter:image" content="https://jeanzey.com/og-image.jpg" />

    <!-- Structured Data – Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Jeanzey",
      "url": "https://jeanzey.com",
      "description": "Mumbai's premium luxury fashion store. Shop men's and women's clothing online.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://jeanzey.com/collection?query={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data – Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Jeanzey",
      "url": "https://jeanzey.com",
      "logo": "https://jeanzey.com/logo.png",
      "description": "Mumbai's premium luxury fashion store offering trendy men's and women's clothing.",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-9987683105",
        "contactType": "customer service",
        "availableLanguage": ["English", "Hindi"],
        "hoursAvailableSpecification": "Mo-Su 09:00-21:00"
      },
      "sameAs": [
        "https://www.instagram.com/jeanzey",
        "https://www.facebook.com/jeanzey",
        "https://twitter.com/jeanzey"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Mumbai",
        "addressRegion": "Maharashtra",
        "addressCountry": "India"
      }
    }
    </script>

    <!-- Structured Data – BreadcrumbList -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://jeanzey.com/"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Collection",
          "item": "https://jeanzey.com/collection"
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <!-- React entry point -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Razorpay checkout -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </body>
</html>
